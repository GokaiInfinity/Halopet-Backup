name: halopet_mobile
description: HaloPet veterinary telemedicine mobile application.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  crypto: ^3.0.3
  uuid: ^4.4.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - docs/figma_reference/
